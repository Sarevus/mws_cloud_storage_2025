<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Cloud Storage</title>
    <link rel="stylesheet" href="./styles/index.css">
    <script src="script.js" type="module"></script>
</head>
<body>
    <div class="log-in">
        <h1 class="title">Войти</h1>
        
        <form class="field-form" id="username-form">
            <div class="field">
                <input class="field_input" id="login-username" name="username" placeholder=" " autocomplete="username" required/>
                <label class="field_label" for="login-username">Введите почту</label>
            </div>
        </form>
        <form class="field-form" id="password-form">
            <div class="field">
                <input class="field_input" id="login-password" name="password" type="password" placeholder=" " autocomplete="current-password" required/>
                <label class="field_label" for="login-password">Введите пароль</label>
            </div>
        </form>
        <form class="field-form" id="submit-form">
            <button class="button" type="submit">Войти</button>
        </form>
        
        <a href="registerIndex.html" class="auth-link">
            Ещё не зарегистрированы?
        </a>
        <a href="index.html" class="auth-link">
            Вернуться на главную ↪
        </a>
    </div>

    <script>
        // Обработчик формы - исправлено на правильный ID
        document.getElementById('submit-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            // Здесь AJAX запрос к API
            console.log('Login attempt:', username, password);
            
            // После успешной авторизации:
            window.location.href = 'myProfile.html';
        });
    </script>
</body>
</html>
