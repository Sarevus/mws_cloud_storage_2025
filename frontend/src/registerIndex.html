<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Cloud Storage</title>
    <link rel="stylesheet" href="./styles/index.css">
</head>

<body>
    <div class="log-in">
        <h1 class="title">Зарегистрироваться</h1>
        <form class="field-form">
            <div class="field">
                <input class="field_input" id="name" placeholder=" " autocomplete="off"/>
                <label class="field_label" for="name">Имя</label>
            </div>
        </form>
        <form class="field-form">
            <div class="field">
                <input class="field_input" id="phone" placeholder=" " autocomplete="off"/>
                <label class="field_label" for="phone">Номер телефона</label>
            </div>
        </form>
        <form class="field-form">
            <div class="field">
                <input class="field_input" id="email" type="email" placeholder=" " autocomplete="off"/>
                <label class="field_label" for="email">Email</label>
            </div>
        </form>
        <form class="field-form">
            <div class="field">
                <input class="field_input" id="reg-password" type="password" placeholder=" " autocomplete="off"/>
                <label class="field_label" for="reg-password">Пароль</label>
            </div>
        </form>
        <button class="button" type="submit" onclick="location.href='myProfile.html'">Зарегистрироваться</button>
        <a href="loginIndex.html" class="auth-link">
            Уже зарегистрированы?
        </a>
        <a href="index.html" class="auth-link">
            Вернуться на главную ↪
        </a>
    </div>
</body>
</html>
