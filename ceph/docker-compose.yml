version: '3.8'

services:
  mon:
    image: ceph/ceph:v16
    container_name: ceph-mon
    hostname: mon0
    networks:
      ceph-network:
        ipv4_address: 172.25.0.10
    environment:
      - CEPH_DAEMON=mon
      - MON_IP=172.25.0.10
      - CEPH_PUBLIC_NETWORK=172.25.0.0/16
    volumes:
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ceph-conf:/etc/ceph
      - ceph-mon-data:/var/lib/ceph/mon
      - ceph-bootstrap:/var/lib/ceph/bootstrap-osd
    entrypoint: /entrypoint.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ceph", "-s"]
      interval: 10s
      timeout: 5s
      retries: 3

  mgr:
    image: ceph/ceph:v16
    container_name: ceph-mgr
    hostname: mgr0
    networks:
      ceph-network:
        ipv4_address: 172.25.0.11
    environment:
      - CEPH_DAEMON=mgr
      - MON_IP=172.25.0.10
      - CEPH_PUBLIC_NETWORK=172.25.0.0/16
    volumes:
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ceph-conf:/etc/ceph
      - ceph-mgr-data:/var/lib/ceph/mgr
    ports:
      - "8080:8080"  # Dashboard panel
      - "9283:9283"  # Prometheus metrics
    depends_on:
      - mon
    entrypoint: /entrypoint.sh
    restart: unless-stopped

  osd:
    image: ceph/ceph:v16
    container_name: ceph-osd
    hostname: osd0
    networks:
      ceph-network:
        ipv4_address: 172.25.0.12
    environment:
      - CEPH_DAEMON=osd
      - MON_IP=172.25.0.10
      - CEPH_PUBLIC_NETWORK=172.25.0.0/16
    volumes:
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ceph-conf:/etc/ceph
      - ceph-osd-data:/var/lib/ceph/osd
      - ceph-bootstrap:/var/lib/ceph/bootstrap-osd
    depends_on:
      - mon
    entrypoint: /entrypoint.sh
    restart: unless-stopped
    privileged: true

  rgw:
    image: ceph/ceph:v16
    container_name: ceph-rgw
    hostname: rgw0
    networks:
      ceph-network:
        ipv4_address: 172.25.0.13
    environment:
      - CEPH_DAEMON=rgw
      - MON_IP=172.25.0.10
      - CEPH_PUBLIC_NETWORK=172.25.0.0/16
      - RGW_FRONTEND_PORT=9000
      - RGW_ACCESS_KEY=${RGW_ACCESS_KEY:-}
      - RGW_SECRET_KEY=${RGW_SECRET_KEY:-}
    volumes:
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ceph-conf:/etc/ceph
      - ceph-rgw-data:/var/lib/ceph/radosgw
    ports:
      - "9000:9000"  # RGW S3/Swift API
    depends_on:
      mon:
        condition: service_healthy
    entrypoint: /entrypoint.sh
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ceph-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  ceph-conf:
  ceph-mon-data:
  ceph-mgr-data:
  ceph-osd-data:
  ceph-rgw-data:
  ceph-bootstrap:
