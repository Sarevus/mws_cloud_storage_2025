<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой кабинет - Cloud Storage</title>
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/profile.css">
    <link rel="stylesheet" href="./styles/edit-profile.css">

</head>
<body>
    <div class="overlay"></div>
    <div class="background-circles">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    
    <!-- Шапка профиля -->
    <header class="profile-header">
        <div class="header-content">
            <h1>Мой кабинет</h1>
            <div class="user-info">
                <div class="user-avatar">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" fill="white"/>
                        <path d="M12 14C7.58172 14 4 17.5817 4 22H20C20 17.5817 16.4183 14 12 14Z" fill="white"/>
                    </svg>
                </div>
                <div class="user-details">
                    <h2 id="user-name"></h2>
                    <p id="user-email"></p>
                    <p id = user-number></p>
                    <!-- Добавляем кнопку редактирования -->
                    <button class="edit-profile-btn" id="edit-profile-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        Редактировать профиль
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Основной контент -->
    <main class="profile-main">
        <div class="actions-container">
            <div class="action-card">
                <div class="action-icon">
                    <svg width="50" height="50" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M7 17L17 7M17 7H7M17 7V17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h3>Обмен файлами</h3>
                <p>Начните хранить свои файлы в безопасности или получите доступ к общим файлам</p>
                <button class="action-btn exchange-btn" onclick="location.href='fileExchange.html'">Начать обмен</button>
            </div>
        </div>
        
        <!-- Список файлов -->
        <div class="files-section">
            <h2>Недавние файлы</h2>
            <div class="files-grid">
                <div class="file-item">
                    <div class="file-icon">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M14 2V8H20" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M16 13H8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M16 17H8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M10 9H9H8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="file-info">
                        <h4>Документ.docx</h4>
                    </div>
                    <div class="file-actions">
                        <button class="file-btn download-file">Скачать</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="profile-navigation">
            <a href="index.html" class="nav-link">Выйти из профиля</a>
        </div>
    </main>
        <script src="scriptUser.js" type="module"></script>
</body>
</html>
