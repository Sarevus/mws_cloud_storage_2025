<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование пользователя</title>
</head>
<body>

<h2>Редактирование пользователя</h2>

<form id="update-form">
    <label for="name">Имя:</label><br>
    <input id="name" type="text"><br><br>

    <label for="email">Email:</label><br>
    <input id="email" type="email"><br><br>

    <label for="phone">Телефон:</label><br>
    <input id="phone" type="text"><br><br>

    <label for="reg-password">Пароль:</label><br>
    <input id="reg-password" type="password"><br><br>

    <button id="reg-button">Сохранить</button>
    <button id="delete-button" type="button" style="margin-left:10px; color:red;">Удалить</button>
</form>

<script src="update_user.js"></script>

</body>
</html>
