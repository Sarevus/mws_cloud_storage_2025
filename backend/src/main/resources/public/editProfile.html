<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование профиля - Cloud Storage</title>
    <link rel="stylesheet" href="/styles/index.css">
    <link rel="stylesheet" href="/styles/edit-profile.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="background-circles">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="edit-profile-container">
        <div class="edit-header">
            <h1>Редактирование профиля</h1>
            <p>Обновите ваши личные данные</p>
        </div>

        <form class="edit-form" id="profileForm">
            <div class="form-group">
                <label for="name">Имя</label>
                <input type="text" id="name" class="form-control" placeholder="Введите ваше имя">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" placeholder="Введите ваш email">
            </div>

            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" class="form-control" placeholder="Введите ваш телефон">
            </div>
            
            <div class="form-actions">
                <button type="submit" id="save-button" class="btn-save">Сохранить изменения</button>
                <button type="button" id="cancel-button" class="btn-cancel">Отмена</button>
                <button type="button" id="delete-button" class="btn-delete">Удалить аккаунт</button>
            </div>
        </form>
    </div>
    
    <script src="/scripts/update_user.js"></script>
</body>
</html>
