<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление файлами - Cloud Storage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .user-info {
            color: #666;
            font-size: 14px;
        }

        .upload-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }

        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
        }

        input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .files-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .file-item:hover {
            background: #f8f9ff;
            border-color: #667eea;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .file-meta {
            font-size: 12px;
            color: #666;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 14px;
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-secondary {
            background: #95a5a6;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📁 Мои файлы</h1>
        <div class="user-info">User ID: <span id="userId"></span></div>
    </div>

    <div id="messageContainer"></div>

    <div class="upload-section">
        <h2 style="margin-bottom: 20px;">Загрузить файл</h2>
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">☁️</div>
            <p style="margin-bottom: 20px;">Перетащите файл сюда или нажмите для выбора</p>
            <input type="file" id="fileInput" multiple>
            <button class="btn" onclick="document.getElementById('fileInput').click()">
                Выбрать файл
            </button>
        </div>
        <div id="selectedFiles" style="margin-top: 20px;"></div>
    </div>

    <div class="files-section">
        <h2 style="margin-bottom: 20px;">Все файлы</h2>
        <div id="filesList">
            <div class="loading">
                <div class="spinner"></div>
                <p>Загрузка файлов...</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Получаем userId из URL или localStorage
    const urlParams = new URLSearchParams(window.location.search);
    let userId = urlParams.get('userId') || localStorage.getItem('userId');

    if (!userId) {
        // Для тестирования - создаем временный UUID
        userId = '99c84087-1fc8-4c7f-95c0-c181481e6634';
        showMessage('⚠️ User ID не найден. Используется демо режим.', 'error');
    }

    document.getElementById('userId').textContent = userId;

    const API_BASE = '/api';
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const filesList = document.getElementById('filesList');
    const selectedFilesDiv = document.getElementById('selectedFiles');

    // Drag & Drop
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    });

    uploadArea.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
    });

    function handleFiles(files) {
        if (files.length === 0) return;

        selectedFilesDiv.innerHTML = '<h3>Выбранные файлы:</h3>';

        Array.from(files).forEach((file, index) => {
            const fileDiv = document.createElement('div');
            fileDiv.style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 1px solid #e0e0e0; margin: 10px 0; border-radius: 5px;';
            fileDiv.innerHTML = `
                    <div>
                        <strong>${file.name}</strong>
                        <span style="color: #666; font-size: 12px;">(${formatFileSize(file.size)})</span>
                    </div>
                    <button class="btn btn-small" onclick="uploadSingleFile(${index})">Загрузить</button>
                `;
            selectedFilesDiv.appendChild(fileDiv);
        });

        window.selectedFiles = files;
    }

    async function uploadSingleFile(index) {
        const file = window.selectedFiles[index];
        const formData = new FormData();
        formData.append('file', file);

        try {
            showMessage(`⏳ Загрузка файла "${file.name}"...`, 'success');

            const response = await fetch(`${API_BASE}/files/upload?userId=${userId}`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                showMessage(`✅ Файл "${file.name}" успешно загружен!`, 'success');
                loadFiles();
                selectedFilesDiv.innerHTML = '';
                fileInput.value = '';
            } else {
                showMessage(`❌ Ошибка: ${data.error}`, 'error');
            }
        } catch (error) {
            console.error('Upload error:', error);
            showMessage(`❌ Ошибка загрузки: ${error.message}`, 'error');
        }
    }

    async function loadFiles() {
        try {
            const response = await fetch(`${API_BASE}/files?userId=${userId}`);
            const data = await response.json();

            if (data.success && data.files.length > 0) {
                filesList.innerHTML = data.files.map(file => `
                        <div class="file-item">
                            <div class="file-info">
                                <div class="file-name">📄 ${file.originalName}</div>
                                <div class="file-meta">
                                    ${formatFileSize(file.size)} • ${file.mimeType} • ${file.id}
                                </div>
                            </div>
                            <div class="file-actions">
                                <button class="btn btn-small btn-secondary" onclick="downloadFile('${file.id}')">
                                    ⬇️ Скачать
                                </button>
                                <button class="btn btn-small btn-danger" onclick="deleteFile('${file.id}', '${file.originalName}')">
                                    🗑️ Удалить
                                </button>
                            </div>
                        </div>
                    `).join('');
            } else {
                filesList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📂</div>
                            <p>У вас пока нет файлов</p>
                            <p style="color: #ccc; font-size: 14px;">Загрузите первый файл выше</p>
                        </div>
                    `;
            }
        } catch (error) {
            console.error('Load files error:', error);
            filesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <p>Ошибка загрузки файлов</p>
                        <p style="color: #ccc; font-size: 14px;">${error.message}</p>
                    </div>
                `;
        }
    }

    async function downloadFile(fileId) {
        try {
            showMessage('⏳ Подготовка файла к скачиванию...', 'success');
            const response = await fetch(`${API_BASE}/files/${fileId}/download?userId=${userId}`);
            const data = await response.json();

            if (data.success) {
                // TODO: Реализовать реальное скачивание
                showMessage('⚠️ Скачивание пока не реализовано. Добавьте интеграцию с S3/Ceph.', 'error');
            } else {
                showMessage(`ℹ️ ${data.message}`, 'error');
            }
        } catch (error) {
            showMessage(`❌ Ошибка: ${error.message}`, 'error');
        }
    }

    async function deleteFile(fileId, fileName) {
        if (!confirm(`Вы уверены, что хотите удалить файл "${fileName}"?`)) {
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/files/${fileId}?userId=${userId}`, {
                method: 'DELETE'
            });

            const data = await response.json();

            if (data.success) {
                showMessage(`✅ Файл "${fileName}" успешно удален!`, 'success');
                loadFiles();
            } else {
                showMessage(`❌ Ошибка: ${data.error}`, 'error');
            }
        } catch (error) {
            showMessage(`❌ Ошибка удаления: ${error.message}`, 'error');
        }
    }

    function formatFileSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
    }

    function showMessage(text, type) {
        const messageContainer = document.getElementById('messageContainer');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        messageDiv.textContent = text;
        messageContainer.appendChild(messageDiv);

        setTimeout(() => {
            messageDiv.remove();
        }, 5000);
    }

    // Загружаем файлы при загрузке страницы
    loadFiles();
</script>
</body>
</html>
