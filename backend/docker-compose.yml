services:
  postgres:
    image: postgres:15
    container_name: cloud3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloud3_data
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: dev123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - cloud3-network

volumes:
  postgres_data:

networks:
  cloud3-network:
    driver: bridge
